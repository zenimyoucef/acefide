version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cefide-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cefide
      POSTGRES_PASSWORD: cefide_password
      POSTGRES_DB: cefide
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cefide"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cefide-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://cefide:cefide_password@postgres:5432/cefide?schema=public"
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres_data:
